<!DOCTYPE html>
<html lang="he" dir="rtl" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>NERO</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    body,table,td,a{ -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table,td{ mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img{ -ms-interpolation-mode:bicubic; border:0; height:auto; line-height:100%; outline:none; text-decoration:none; }
    body{ margin:0; padding:0; width:100%!important; height:100%!important; }
    @media screen and (max-width:600px){
      .container{ width:100%!important; }
      .stack{ display:block!important; width:100%!important; }
      .px{ padding-left:20px!important; padding-right:20px!important; }
    }
  </style>
</head>
<!-- TEMPLATE: PROMO / SALE. Replace {{TOKENS}}. No footer (Flashy adds it). -->
<body style="margin:0; padding:0; background-color:#F4F4F2;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all;">{{PREHEADER}}</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4F4F2;">
    <tr>
      <td align="center" style="padding:0;">
        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px; background-color:#FFFFFF;">

          <!-- HEADER -->
          <tr>
            <td align="center" bgcolor="#D9D3C7" style="background-color:#D9D3C7; padding:22px 0;">
              <img src="https://uploads.nadavezra.com/email/7a78de3c-b5b8-4933-8e54-e9268c58b75e.png" width="140" alt="NERO" style="display:block; width:140px; max-width:140px; height:auto;">
            </td>
          </tr>

          <!-- HERO -->
          <tr>
            <td style="padding:0;">
              <img src="{{HERO_IMG}}" width="600" alt="{{HERO_ALT}}" style="display:block; width:100%; max-width:600px; height:auto;">
            </td>
          </tr>
          <tr>
            <td class="px" align="center" style="padding:32px 40px 8px 40px;">
              <h1 style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:28px; line-height:1.25; letter-spacing:2px; color:#0A0A0A; text-transform:uppercase; font-weight:bold;">{{HEADLINE}}</h1>
            </td>
          </tr>
          <tr>
            <td class="px" align="center" style="padding:0 40px 24px 40px;">
              <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:16px; line-height:1.6; color:#5A5A5A;">{{SUBCOPY}}</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 40px 36px 40px;">
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{CTA_URL}}" style="height:48px;v-text-anchor:middle;width:240px;" arcsize="0%" strokecolor="#0A0A0A" fillcolor="#0A0A0A">
                <w:anchorlock/><center style="color:#FFFFFF;font-family:Arial,sans-serif;font-size:15px;letter-spacing:1px;">{{CTA_TEXT}}</center>
              </v:roundrect>
              <![endif]-->
              <!--[if !mso]><!-->
              <a href="{{CTA_URL}}" style="display:inline-block; background-color:#0A0A0A; color:#FFFFFF; font-family:Arial,Helvetica,sans-serif; font-size:15px; letter-spacing:1px; text-transform:uppercase; text-decoration:none; padding:15px 40px;">{{CTA_TEXT}}</a>
              <!--<![endif]-->
            </td>
          </tr>

          <!-- PRODUCT GRID -->
          <tr>
            <td class="px" style="padding:8px 30px 32px 30px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td class="stack" width="33%" valign="top" style="padding:10px;">
                    <a href="{{P1_URL}}" style="text-decoration:none;">
                      <img src="{{P1_IMG}}" width="160" alt="{{P1_ALT}}" style="display:block; width:100%; max-width:160px; height:auto; margin:0 auto;">
                      <p style="margin:12px 0 4px 0; font-family:Arial,Helvetica,sans-serif; font-size:15px; color:#0A0A0A; text-align:center;">{{P1_NAME}}</p>
                      <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:14px; color:#8A8A8A; text-align:center;">{{P1_PRICE}}</p>
                    </a>
                  </td>
                  <td class="stack" width="33%" valign="top" style="padding:10px;">
                    <a href="{{P2_URL}}" style="text-decoration:none;">
                      <img src="{{P2_IMG}}" width="160" alt="{{P2_ALT}}" style="display:block; width:100%; max-width:160px; height:auto; margin:0 auto;">
                      <p style="margin:12px 0 4px 0; font-family:Arial,Helvetica,sans-serif; font-size:15px; color:#0A0A0A; text-align:center;">{{P2_NAME}}</p>
                      <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:14px; color:#8A8A8A; text-align:center;">{{P2_PRICE}}</p>
                    </a>
                  </td>
                  <td class="stack" width="33%" valign="top" style="padding:10px;">
                    <a href="{{P3_URL}}" style="text-decoration:none;">
                      <img src="{{P3_IMG}}" width="160" alt="{{P3_ALT}}" style="display:block; width:100%; max-width:160px; height:auto; margin:0 auto;">
                      <p style="margin:12px 0 4px 0; font-family:Arial,Helvetica,sans-serif; font-size:15px; color:#0A0A0A; text-align:center;">{{P3_NAME}}</p>
                      <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:14px; color:#8A8A8A; text-align:center;">{{P3_PRICE}}</p>
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- TRUST BADGES -->
          <tr>
            <td style="padding:0 30px 28px 30px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-top:1px solid #ECECEC; border-bottom:1px solid #ECECEC;">
                <tr>
                  <td class="stack" width="33%" align="center" style="padding:18px 10px; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.5; color:#0A0A0A;">עמידים במים, ים וזיעה</td>
                  <td class="stack" width="33%" align="center" style="padding:18px 10px; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.5; color:#0A0A0A;">אחריות מלאה לשנתיים</td>
                  <td class="stack" width="33%" align="center" style="padding:18px 10px; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.5; color:#0A0A0A;">אריזת מתנה בכל רכישה</td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
